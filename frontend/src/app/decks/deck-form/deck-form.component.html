<div class="max-w-lg">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ isEdit ? 'Edit Deck' : 'New Deck' }}</h1>

  @if (error) {
    <p class="text-red-600 mb-4">{{ error }}</p>
  }

  <form (ngSubmit)="submit()" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
      <input [(ngModel)]="name" name="name" type="text" required
             class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
             placeholder="e.g. Spanish Vocabulary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea [(ngModel)]="description" name="description" rows="3"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="Optional description"></textarea>
    </div>
    <div class="flex gap-3 mt-2">
      <button type="submit" [disabled]="submitting"
              class="bg-indigo-600 text-white px-5 py-2 rounded hover:bg-indigo-700 text-sm font-medium disabled:opacity-50">
        {{ isEdit ? 'Save Changes' : 'Create Deck' }}
      </button>
      <a routerLink="/decks"
         class="px-5 py-2 rounded border border-gray-300 text-sm text-gray-600 hover:bg-gray-50">
        Cancel
      </a>
    </div>
  </form>
</div>
