<div class="max-w-lg">
  <h1 class="page-title mb-6">{{ isEdit ? 'Edit Deck' : 'New Deck' }}</h1>

  @if (error) {
    <p class="text-error">{{ error }}</p>
  }

  <form (ngSubmit)="submit()" class="flex flex-col gap-4">
    <div>
      <label class="label">Name *</label>
      <input
        [(ngModel)]="name"
        name="name"
        type="text"
        required
        class="input"
        placeholder="e.g. Spanish Vocabulary"
      />
    </div>
    <div>
      <label class="label">Description</label>
      <textarea
        [(ngModel)]="description"
        name="description"
        rows="3"
        class="input"
        placeholder="Optional description"
      ></textarea>
    </div>
    <div class="flex gap-3 mt-2">
      <button type="submit" [disabled]="submitting" class="btn-primary">
        {{ isEdit ? 'Save Changes' : 'Create Deck' }}
      </button>
      <a routerLink="/decks" class="btn-secondary"> Cancel </a>
    </div>
  </form>
</div>
