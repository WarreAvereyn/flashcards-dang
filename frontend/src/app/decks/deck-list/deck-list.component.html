<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-800">My Decks</h1>
  <a routerLink="/decks/new"
     class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 text-sm font-medium">
    + New Deck
  </a>
</div>

@if (error) {
  <p class="text-red-600 mb-4">{{ error }}</p>
}

@if (decks.length === 0 && !error) {
  <p class="text-gray-500">No decks yet. Create one to get started!</p>
}

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  @for (deck of decks; track deck.id) {
    <div class="bg-white rounded-xl shadow p-5 flex flex-col gap-3 border border-gray-100">
      <div>
        <h2 class="text-lg font-semibold text-gray-800">{{ deck.name }}</h2>
        <p class="text-sm text-gray-500 mt-1">{{ deck.description }}</p>
      </div>
      <div class="flex gap-2 mt-auto">
        <a [routerLink]="['/decks', deck.id]"
           class="flex-1 text-center text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded">
          View
        </a>
        <a [routerLink]="['/decks', deck.id, 'study']"
           class="flex-1 text-center text-sm bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 py-1.5 rounded">
          Study
        </a>
        <a [routerLink]="['/decks', deck.id, 'edit']"
           class="flex-1 text-center text-sm bg-yellow-100 hover:bg-yellow-200 text-yellow-700 px-3 py-1.5 rounded">
          Edit
        </a>
        <button (click)="delete(deck.id)"
                class="flex-1 text-center text-sm bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded">
          Delete
        </button>
      </div>
    </div>
  }
</div>
