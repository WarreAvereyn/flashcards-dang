<div class="flex items-center justify-between mb-6">
  <h1 class="page-title">My Decks</h1>
  <a routerLink="/decks/new" class="btn-primary"> + New Deck </a>
</div>

@if (error) {
  <p class="text-error">{{ error }}</p>
}

@if (decks.length === 0 && !error) {
  <p class="text-body">No decks yet. Create one to get started!</p>
}

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
  @for (deck of decks; track deck.id) {
    <div class="card">
      <div>
        <h2 class="section-title">{{ deck.name }}</h2>
        <p class="text-sm text-body mt-1">{{ deck.description }}</p>
      </div>
      <div class="flex gap-2 mt-auto">
        <a [routerLink]="['/decks', deck.id]" class="flex-1 text-center btn-view"> View </a>
        <a [routerLink]="['/decks', deck.id, 'study']" class="flex-1 text-center btn-study">
          Study
        </a>
        <a [routerLink]="['/decks', deck.id, 'edit']" class="flex-1 text-center btn-edit"> Edit </a>
        <button (click)="delete(deck.id)" class="flex-1 text-center btn-delete">Delete</button>
      </div>
    </div>
  }
</div>
