<div class="max-w-lg">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ isEdit ? 'Edit Card' : 'Add Card' }}</h1>

  @if (error) {
    <p class="text-red-600 mb-4">{{ error }}</p>
  }

  <form (ngSubmit)="submit()" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Front *</label>
      <textarea [(ngModel)]="front" name="front" rows="3" required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="Question or term"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Back *</label>
      <textarea [(ngModel)]="back" name="back" rows="3" required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="Answer or definition"></textarea>
    </div>
    <div class="flex gap-3 mt-2">
      <button type="submit" [disabled]="submitting"
              class="bg-indigo-600 text-white px-5 py-2 rounded hover:bg-indigo-700 text-sm font-medium disabled:opacity-50">
        {{ isEdit ? 'Save Changes' : 'Add Card' }}
      </button>
      <a [routerLink]="['/decks', deckId]"
         class="px-5 py-2 rounded border border-gray-300 text-sm text-gray-600 hover:bg-gray-50">
        Cancel
      </a>
    </div>
  </form>
</div>
