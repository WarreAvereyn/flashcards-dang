<div class="max-w-lg">
  <h1 class="page-title mb-6">{{ isEdit ? 'Edit Card' : 'Add Card' }}</h1>

  @if (error) {
    <p class="text-error">{{ error }}</p>
  }

  <form (ngSubmit)="submit()" class="flex flex-col gap-4">
    <div>
      <label class="label">Front *</label>
      <textarea
        [(ngModel)]="front"
        name="front"
        rows="3"
        required
        class="input"
        placeholder="Question or term"
      ></textarea>
    </div>
    <div>
      <label class="label">Back *</label>
      <textarea
        [(ngModel)]="back"
        name="back"
        rows="3"
        required
        class="input"
        placeholder="Answer or definition"
      ></textarea>
    </div>
    <div class="flex gap-3 mt-2">
      <button type="submit" [disabled]="submitting" class="btn-primary">
        {{ isEdit ? 'Save Changes' : 'Add Card' }}
      </button>
      <a [routerLink]="['/decks', deckId]" class="btn-secondary"> Cancel </a>
    </div>
  </form>
</div>
